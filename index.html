<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

.navbar {
  background: linear-gradient(90deg, #0f2027, #203a43, #2c5364);
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: white;
  font-size: 20px;
  font-weight: bold;
}

.menu {
  display: flex;
  gap: 15px;
}

.menu a {
  color: white;
  text-decoration: none;
  padding: 8px 12px;
  transition: 0.3s;
  border-radius: 8px;
}

.menu a:hover {
  background-color: rgba(255,255,255,0.2);
}

/* Botón móvil */
.menu-btn {
  display: none;
  font-size: 24px;
  color: white;
  cursor: pointer;
}

/* Responsive */
@media (max-width: 600px) {
  .menu {
    display: none;
    flex-direction: column;
    background-color: #203a43;
    position: absolute;
    top: 60px;
    right: 0;
    width: 100%;
  }

  .menu.active {
    display: flex;
  }

  .menu-btn {
    display: block;
  }
}
</style>

<nav class="navbar">
  <div class="logo">Mi Página</div>
  
  <div class="menu-btn" onclick="toggleMenu()">☰</div>

  <div class="menu" id="menu">
    <a href="#">Inicio</a>
    <a href="#">Informática</a>
    <a href="#">Proyectos</a>
    <a href="#">Contacto</a>
  </div>
</nav>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("active");
}
</script>
